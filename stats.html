<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CompileRace – Your personal Java speed coding stats and leaderboard." />
  <title>CompileRace — Stats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet" />

  <!-- Auth gate -->
  <script>
    (function requireLogin() {
      const AUTH_KEY = "compileRace::authUser";
      if (!localStorage.getItem(AUTH_KEY)) {
        document.documentElement.style.display = "none";
        location.href = "login.html?next=" + encodeURIComponent("stats.html");
      }
    })();
  </script>

  <style>
    /* ── CHART ── */
    .chart-outer { display:flex; gap:12px; align-items:stretch; }
    .chart-y-axis { display:flex; flex-direction:column; justify-content:space-between; padding-bottom:28px; min-width:32px; }
    .y-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); text-align:right; line-height:1; }
    .chart-inner { flex:1; display:flex; flex-direction:column; }
    .chart-baseline { height:1px; background:var(--border2); margin-top:4px; }
    .chart-bars { display:flex; align-items:flex-end; gap:6px; height:160px; padding:0 2px; }
    .chart-bar-wrap {
      flex:1; display:flex; flex-direction:column; align-items:center;
      gap:6px; height:100%; justify-content:flex-end;
      cursor:pointer; position:relative; text-decoration:none; min-width:0;
    }
    .chart-bar {
      width:100%; max-width:36px; border-radius:5px 5px 0 0; min-height:4px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08);
      transition:opacity 0.2s, transform 0.15s; position:relative; overflow:hidden;
    }
    .chart-bar::after {
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.1), transparent 60%);
    }
    .chart-bar.solved {
      background:linear-gradient(180deg, color-mix(in srgb, var(--bar-color) 80%, white), var(--bar-color));
      border-color:color-mix(in srgb, var(--bar-color) 60%, transparent);
      box-shadow:0 0 10px color-mix(in srgb, var(--bar-color) 40%, transparent);
    }
    .chart-bar-wrap:hover .chart-bar { opacity:0.75; transform:scaleX(0.88); }
    .chart-tooltip {
      position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
      background:var(--surface2); border:1px solid var(--border2); border-radius:8px;
      padding:7px 11px; font-size:11px; font-family:'JetBrains Mono',monospace;
      line-height:1.5; white-space:nowrap; pointer-events:none; opacity:0;
      transition:opacity 0.15s; color:var(--text); z-index:10; text-align:center;
    }
    .chart-tooltip strong { color:var(--accent); display:block; }
    .chart-bar-wrap:hover .chart-tooltip { opacity:1; }
    .chart-label {
      font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--muted);
      text-align:center; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; max-width:100%; padding-top:4px;
    }

    /* ── RESET & ROOT ── */
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0a0c0f; --surface:#111418; --surface2:#181c22;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#c9d1d9; --muted:#57606a;
      --accent:#4ade80; --accent-dim:rgba(74,222,128,0.15); --accent-glow:rgba(74,222,128,0.25);
      --gold:#fbbf24; --silver:#94a3b8; --bronze:#c97c3a; --red:#f87171; --blue:#60a5fa;
    }
    html, body { height:100%; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden;
    }
    body::before {
      content:""; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }

    /* ── HEADER ── */
    .header {
      position:sticky; top:0; z-index:100;
      background:rgba(10,12,15,0.85); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:0 2rem; height:60px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
    }
    .logo { font-size:1.3rem; font-weight:900; letter-spacing:-0.5px; cursor:pointer; text-decoration:none; color:var(--text); }
    .logo span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:8px; border:1px solid var(--border2);
      background:rgba(255,255,255,0.04); color:var(--text);
      font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; text-decoration:none; transition:border-color 0.2s, background 0.2s;
    }
    .back-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
    .clear-btn {
      padding:7px 14px; border-radius:8px; border:1px solid rgba(248,113,113,0.3);
      background:rgba(248,113,113,0.06); color:var(--red);
      font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.2s;
    }
    .clear-btn:hover { background:rgba(248,113,113,0.15); border-color:var(--red); }

    /* ── PAGE ── */
    .page { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:48px 24px 80px; }
    .page-title { font-size:clamp(2rem,5vw,3.2rem); font-weight:900; letter-spacing:-1.5px; line-height:1; margin-bottom:6px; }
    .page-title span { color:var(--accent); }
    .page-sub { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); margin-bottom:48px; }

    /* ── SUMMARY CARDS ── */
    .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:48px; }
    .summary-card {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      padding:20px 18px; position:relative; overflow:hidden;
      transition:border-color 0.2s, transform 0.2s; animation:fadeUp 0.5s ease both;
    }
    .summary-card:hover { border-color:var(--border2); transform:translateY(-2px); }
    .summary-card::before { content:""; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); opacity:0.5; }
    .summary-card.gold-card::before { background:var(--gold); }
    .summary-card.blue-card::before { background:var(--blue); }
    .summary-card.red-card::before  { background:var(--red); }
    .s-label { font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:10px; }
    .s-value { font-size:2rem; font-weight:900; color:var(--accent); line-height:1; letter-spacing:-1px; }
    .summary-card.gold-card .s-value { color:var(--gold); }
    .summary-card.blue-card .s-value { color:var(--blue); }
    .summary-card.red-card  .s-value { color:var(--red); }
    .s-sub { font-size:11px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; }

    /* ── PROGRESS ── */
    .progress-section { margin-bottom:48px; animation:fadeUp 0.5s 0.1s ease both; }
    .progress-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
    .progress-label { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    .progress-count { font-size:13px; font-family:'JetBrains Mono',monospace; color:var(--accent); font-weight:700; }
    .progress-track { height:6px; background:var(--surface2); border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent),#86efac); box-shadow:0 0 12px var(--accent-glow); width:0%; transition:width 1s cubic-bezier(0.16,1,0.3,1); }
    .diff-progress { display:flex; flex-direction:column; gap:10px; margin-top:16px; }
    .diff-row { display:grid; grid-template-columns:70px 1fr 50px; align-items:center; gap:12px; }
    .diff-name { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; }
    .diff-name.easy   { color:#86efac; }
    .diff-name.medium { color:#fde68a; }
    .diff-name.hard   { color:#fca5a5; }
    .diff-track { height:5px; background:var(--surface2); border-radius:999px; overflow:hidden; }
    .diff-fill { height:100%; border-radius:999px; width:0%; transition:width 1s cubic-bezier(0.16,1,0.3,1); }
    .diff-fill.easy   { background:#86efac; box-shadow:0 0 8px rgba(134,239,172,0.4); }
    .diff-fill.medium { background:#fde68a; box-shadow:0 0 8px rgba(253,230,138,0.4); }
    .diff-fill.hard   { background:#fca5a5; box-shadow:0 0 8px rgba(252,165,165,0.4); }
    .diff-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); text-align:right; }

    /* ── SECTION HEADINGS ── */
    .section-heading {
      font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em;
      color:var(--muted); font-family:'JetBrains Mono',monospace;
      margin-bottom:16px; display:flex; align-items:center; gap:10px;
    }
    .section-heading::after { content:""; flex:1; height:1px; background:var(--border); }

    /* ── TABLE ── */
    .table-wrap { border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:48px; animation:fadeUp 0.5s 0.15s ease both; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
    th { padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); font-weight:600; text-align:left; }
    th:last-child { text-align:right; }
    tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,0.025); }
    tbody tr.solved-row { background:rgba(74,222,128,0.03); }
    tbody tr.solved-row:hover { background:rgba(74,222,128,0.06); }
    td { padding:14px 16px; font-size:14px; vertical-align:middle; }
    td:last-child { text-align:right; }
    .rank-cell { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px; width:48px; }
    .rank-gold   { color:var(--gold); text-shadow:0 0 12px rgba(251,191,36,0.5); }
    .rank-silver { color:var(--silver); }
    .rank-bronze { color:var(--bronze); }
    .rank-num    { color:var(--muted); font-size:13px; }
    .title-cell { font-weight:700; }
    .title-link { color:var(--text); text-decoration:none; transition:color 0.15s; }
    .title-link:hover { color:var(--accent); }
    .pill { display:inline-block; font-size:10px; padding:3px 9px; border-radius:999px; font-family:'JetBrains Mono',monospace; font-weight:600; margin-left:8px; vertical-align:middle; }
    .pill-easy   { color:#86efac; background:rgba(134,239,172,0.1); border:1px solid rgba(134,239,172,0.2); }
    .pill-medium { color:#fde68a; background:rgba(253,230,138,0.1); border:1px solid rgba(253,230,138,0.2); }
    .pill-hard   { color:#fca5a5; background:rgba(252,165,165,0.1); border:1px solid rgba(252,165,165,0.2); }
    .tag-list { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
    .tag { font-size:10px; font-family:'JetBrains Mono',monospace; padding:2px 7px; border-radius:999px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--muted); }
    .time-cell { font-family:'JetBrains Mono',monospace; font-weight:700; }
    .time-solved   { color:var(--accent); font-size:15px; }
    .time-unsolved { color:var(--muted); font-size:13px; font-weight:400; }
    tbody tr.medal-1 { box-shadow:inset 3px 0 0 var(--gold); }
    tbody tr.medal-2 { box-shadow:inset 3px 0 0 var(--silver); }
    tbody tr.medal-3 { box-shadow:inset 3px 0 0 var(--bronze); }
    .status-icon { font-size:16px; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
    .empty-state .big { font-size:3rem; margin-bottom:16px; }
    .empty-state p { font-size:14px; line-height:1.6; }
    .empty-state a { display:inline-block; margin-top:20px; padding:10px 20px; border-radius:10px; border:1px solid var(--accent); color:var(--accent); text-decoration:none; font-weight:700; transition:0.2s; }
    .empty-state a:hover { background:var(--accent); color:#000; }

    /* ── CHART SECTION ── */
    .chart-section { margin-bottom:48px; animation:fadeUp 0.5s 0.2s ease both; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    /* ── TABS ── */
    .tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; width:fit-content; }
    .tab-btn { padding:7px 16px; border-radius:7px; border:none; background:transparent; color:var(--muted); font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.18s; }
    .tab-btn.active { background:var(--accent); color:#0a0c0f; }
    .tab-btn:not(.active):hover { color:var(--text); background:rgba(255,255,255,0.05); }

    /* ── RESPONSIVE ── */
    @media (max-width:640px) {
      .page { padding:32px 16px 60px; }
      .summary-grid { grid-template-columns:repeat(2,1fr); }
      th:nth-child(4), td:nth-child(4) { display:none; }
      .chart-bars { gap:4px; }
    }
  </style>
</head>
<body>

<header class="header">
  <a class="logo" href="index.html">Compile<span>Race</span></a>
  <div class="header-right">
    <button class="clear-btn" id="clearBtn">🗑 Reset Stats</button>
    <a class="back-btn" href="index.html">← Home</a>
  </div>
</header>

<main class="page">
  <h1 class="page-title">Your <span>Stats</span></h1>
  <p class="page-sub" id="pageSubtitle">Loading your data...</p>
  <div class="summary-grid"    id="summaryGrid"></div>
  <div class="progress-section" id="progressSection"></div>
  <div class="chart-section"   id="chartSection"></div>
  <div                         id="tableSection"></div>
</main>

<script src="questions.js"></script>
<script>
/* ══════════════════════════════════════
   DATA LOADING
══════════════════════════════════════ */
// FIX: renamed to avoid shadowing window.QUESTIONS global
const ALL_QUESTIONS = window.QUESTIONS || [];

// FIX: parseFloat instead of parseInt to preserve decimal best times
function getBestTime(id) {
  const v = localStorage.getItem(`compileRaceBestTime::${id}`);
  return v ? parseFloat(v) : null;
}

function buildData() {
  return ALL_QUESTIONS.map((q) => ({
    ...q,
    bestTime: getBestTime(q.id),
    solved:   getBestTime(q.id) !== null,
  }));
}

/* ══════════════════════════════════════
   SUMMARY CARDS
══════════════════════════════════════ */
function renderSummary(data) {
  const solved  = data.filter((d) => d.solved);
  const total   = data.length;
  const times   = solved.map((d) => d.bestTime);
  const fastest = times.length ? Math.min(...times) : null;
  const avgTime = times.length ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : null;
  const easySolved = data.filter((d) => d.solved && d.difficulty === "Easy").length;
  const medSolved  = data.filter((d) => d.solved && d.difficulty === "Medium").length;
  const hardSolved = data.filter((d) => d.solved && d.difficulty === "Hard").length;
  const pct = total ? Math.round((solved.length / total) * 100) : 0;

  document.getElementById("pageSubtitle").textContent =
    solved.length
      ? `${solved.length} of ${total} challenges solved · ${pct}% complete`
      : "No challenges solved yet — start racing!";

  const cards = [
    { label:"Solved",  value:`${solved.length}/${total}`, sub:`${pct}% complete`,                 cls:""          },
    { label:"Fastest", value:fastest ? `${fastest}s` : "—", sub:fastest ? "best single solve" : "not yet", cls:"gold-card" },
    { label:"Average", value:avgTime ? `${avgTime}s` : "—", sub:avgTime ? "avg solve time"    : "not yet", cls:"blue-card" },
    { label:"Easy",    value:`${easySolved}`, sub:`of ${data.filter(d=>d.difficulty==="Easy").length}`,    cls:""          },
    { label:"Medium",  value:`${medSolved}`,  sub:`of ${data.filter(d=>d.difficulty==="Medium").length}`,  cls:""          },
    { label:"Hard",    value:`${hardSolved}`, sub:`of ${data.filter(d=>d.difficulty==="Hard").length}`,    cls:"red-card"  },
  ];

  document.getElementById("summaryGrid").innerHTML = cards.map((c, i) => `
    <div class="summary-card ${c.cls}" style="animation-delay:${i * 0.06}s">
      <div class="s-label">${c.label}</div>
      <div class="s-value">${c.value}</div>
      <div class="s-sub">${c.sub}</div>
    </div>
  `).join("");
}

/* ══════════════════════════════════════
   PROGRESS BARS
══════════════════════════════════════ */
function renderProgress(data) {
  const total  = data.length;
  const solved = data.filter((d) => d.solved).length;
  const pct    = total ? (solved / total) * 100 : 0;

  const diffs    = ["Easy", "Medium", "Hard"];
  const diffRows = diffs.map((diff) => {
    const all  = data.filter((d) => d.difficulty === diff);
    const done = all.filter((d) => d.solved);
    const p    = all.length ? (done.length / all.length) * 100 : 0;
    return { diff, done: done.length, total: all.length, pct: p };
  }).filter((r) => r.total > 0);

  document.getElementById("progressSection").innerHTML = `
    <div class="section-heading">Overall Progress</div>
    <div class="progress-header">
      <span class="progress-label">Completion</span>
      <span class="progress-count">${solved} / ${total}</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="mainFill" style="width:0%"></div>
    </div>
    <div class="diff-progress">
      ${diffRows.map((r) => `
        <div class="diff-row">
          <span class="diff-name ${r.diff.toLowerCase()}">${r.diff}</span>
          <div class="diff-track">
            <div class="diff-fill ${r.diff.toLowerCase()}" data-pct="${r.pct}"></div>
          </div>
          <span class="diff-count">${r.done}/${r.total}</span>
        </div>
      `).join("")}
    </div>
  `;

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById("mainFill").style.width = pct + "%";
      document.querySelectorAll(".diff-fill").forEach((el) => {
        el.style.width = el.dataset.pct + "%";
      });
    }, 100);
  });
}

/* ══════════════════════════════════════
   BAR CHART
══════════════════════════════════════ */
function renderChart(data, filter = "all") {
  const filtered = filter === "all" ? data : data.filter((d) => d.difficulty === filter);
  const solved   = filtered.filter((d) => d.solved);
  const maxTime  = solved.length ? Math.max(...solved.map((d) => d.bestTime)) : 1;
  const section  = document.getElementById("chartSection");

  if (!filtered.length) { section.innerHTML = ""; return; }

  const tabs = ["all", "Easy", "Medium", "Hard"];

  section.innerHTML = `
    <div class="section-heading">Time Distribution</div>
    <div class="tabs" id="chartTabs">
      ${tabs.map((t) => `
        <button class="tab-btn ${t === filter ? "active" : ""}" data-tab="${t}">
          ${t === "all" ? "All" : t}
        </button>
      `).join("")}
    </div>
    <div class="chart-outer">
      <div class="chart-y-axis" id="chartYAxis"></div>
      <div class="chart-inner">
        <div class="chart-bars" id="chartBars">
          ${filtered.map((d, i) => {
            const h   = d.solved ? Math.max(12, Math.round((d.bestTime / maxTime) * 160)) : 12;
            const tip = d.solved ? `${d.bestTime}s` : "Not solved";
            const diffColor = d.difficulty === "Easy" ? "#86efac" : d.difficulty === "Medium" ? "#fde68a" : "#fca5a5";
            const shortTitle = d.title.length > 10
              ? d.title.replace(/of|a|the|Two/gi, "").trim().split(" ").slice(0, 2).join(" ")
              : d.title;
            // FIX: use ALL_QUESTIONS instead of shadowed QUESTIONS
            return `
              <a class="chart-bar-wrap" href="race.html?q=${ALL_QUESTIONS.indexOf(d)}" style="animation-delay:${i*0.03}s">
                <div class="chart-tooltip">${d.title}<br><strong>${tip}</strong></div>
                <div class="chart-bar ${d.solved ? "solved" : ""}"
                     style="height:${h}px; ${d.solved ? `--bar-color:${diffColor}` : ""}"></div>
                <div class="chart-label">${shortTitle}</div>
              </a>
            `;
          }).join("")}
        </div>
        <div class="chart-baseline"></div>
      </div>
    </div>
  `;

  const yAxis = document.getElementById("chartYAxis");
  const steps = 4;
  for (let i = steps; i >= 0; i--) {
    const val = Math.round((i / steps) * maxTime);
    const div = document.createElement("div");
    div.className   = "y-label";
    div.textContent = i === 0 ? "0s" : `${val}s`;
    yAxis.appendChild(div);
  }

  document.getElementById("chartTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".tab-btn");
    if (!btn) return;
    renderChart(data, btn.dataset.tab);
  });
}

/* ══════════════════════════════════════
   LEADERBOARD TABLE
══════════════════════════════════════ */
function renderTable(data, filter = "all") {
  const filtered = filter === "all" ? data : data.filter((d) => d.difficulty === filter);

  const sorted = [...filtered].sort((a, b) => {
    if (a.solved && b.solved) return a.bestTime - b.bestTime;
    if (a.solved) return -1;
    if (b.solved) return 1;
    return a.title.localeCompare(b.title);
  });

  const tabs    = ["all", "Easy", "Medium", "Hard"];
  const section = document.getElementById("tableSection");

  if (!filtered.length) {
    section.innerHTML = `<div class="empty-state"><div class="big">🏗</div><p>No questions in this category yet.</p></div>`;
    return;
  }

  section.innerHTML = `
    <div class="section-heading">Personal Leaderboard</div>
    <div class="tabs" id="tableTabs">
      ${tabs.map((t) => `
        <button class="tab-btn ${t === filter ? "active" : ""}" data-tab="${t}">
          ${t === "all" ? "All" : t}
        </button>
      `).join("")}
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Challenge</th>
            <th>Status</th>
            <th>Difficulty</th>
            <th>Best Time</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map((d, i) => {
            // FIX: use ALL_QUESTIONS
            const origIdx   = ALL_QUESTIONS.indexOf(d);
            const rank      = d.solved ? i + 1 : null;
            const rankClass =
              rank === 1 ? "rank-gold" :
              rank === 2 ? "rank-silver" :
              rank === 3 ? "rank-bronze" : "rank-num";
            const rowClass = !d.solved ? "" : rank <= 3 ? `solved-row medal-${rank}` : "solved-row";
            const rankLabel =
              rank === 1 ? "🥇" :
              rank === 2 ? "🥈" :
              rank === 3 ? "🥉" :
              rank ? `#${rank}` : "—";

            return `
              <tr class="${rowClass}">
                <td class="rank-cell"><span class="${rankClass}">${rankLabel}</span></td>
                <td class="title-cell">
                  <a class="title-link" href="race.html?q=${origIdx}">${d.title}</a>
                  <div class="tag-list">
                    ${(d.tags || []).map((t) => `<span class="tag">${t}</span>`).join("")}
                  </div>
                </td>
                <td class="status-icon">${d.solved ? "✅" : "⬜"}</td>
                <td><span class="pill pill-${d.difficulty.toLowerCase()}">${d.difficulty}</span></td>
                <td class="time-cell">
                  ${d.solved
                    ? `<span class="time-solved">${d.bestTime}s</span>`
                    : `<span class="time-unsolved">Not attempted</span>`
                  }
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById("tableTabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".tab-btn");
    if (!btn) return;
    renderTable(data, btn.dataset.tab);
  });
}

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
function renderEmptyState() {
  document.getElementById("summaryGrid").innerHTML     = "";
  document.getElementById("progressSection").innerHTML = "";
  document.getElementById("chartSection").innerHTML    = "";
  document.getElementById("tableSection").innerHTML    = `
    <div class="empty-state">
      <div class="big">🏁</div>
      <p>You haven't solved any challenges yet.<br>Head back and start racing to see your stats here!</p>
      <a href="index.html">Start Practicing →</a>
    </div>
  `;
}

/* ══════════════════════════════════════
   CLEAR BUTTON
══════════════════════════════════════ */
document.getElementById("clearBtn").addEventListener("click", () => {
  const btn = document.getElementById("clearBtn");

  if (btn.dataset.confirm === "1") {
    // FIX: use ALL_QUESTIONS
    ALL_QUESTIONS.forEach((q) => localStorage.removeItem(`compileRaceBestTime::${q.id}`));
    btn.textContent = "✓ Cleared!";
    btn.style.color = "var(--accent)";
    btn.style.borderColor = "var(--accent)";
    setTimeout(() => location.reload(), 800);
  } else {
    btn.dataset.confirm = "1";
    btn.textContent = "⚠ Sure? Click again";
    btn.style.background = "rgba(248,113,113,0.18)";
    setTimeout(() => {
      btn.dataset.confirm = "";
      btn.textContent = "🗑 Reset Stats";
      btn.style.background = "";
    }, 3000);
  }
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
(function init() {
  const accent = localStorage.getItem("compileRaceAccent");
  if (accent) {
    document.documentElement.style.setProperty("--accent",      accent);
    document.documentElement.style.setProperty("--accent-glow", accent + "44");
    document.documentElement.style.setProperty("--accent-dim",  accent + "22");
  }

  const data = buildData();

  if (!data.some((d) => d.solved)) {
    renderEmptyState();
    return;
  }

  renderSummary(data);
  renderProgress(data);
  renderChart(data);
  renderTable(data);
})();
</script>

</body>
</html>
